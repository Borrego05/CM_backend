spring.application.name=backend

#CONFIGURACION CONEXION A LA BD LOCAL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8080
server.address=0.0.0.0

#JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

#CLOUDFARE
R2_ENDPOINT=${R2_ENDPOINT}
R2_BUCKET=${R2_BUCKET}
R2_ACCESS_KEY=${R2_ACCESS_KEY}
R2_SECRET_KEY=${R2_SECRET_KEY}

# Carpetas de almacenamiento (desactivado para Railway - sistema de archivos efímero)
# Para reactivar: descomentar estas líneas y configurar las variables de entorno
# correspondientes en Railway (APP_STORAGE_PDF, APP_STORAGE_IMAGENES,
# APP_STORAGE_FIRMAS, APP_STORAGE_BASE). También descomentar los @Value en
# PdfService.java, ActaSiloPdfService.java y las secciones [STORAGE] en los services.
# app.storage.pdf=${APP_STORAGE_PDF}                                          # [STORAGE]
# app.storage.imagenes=${APP_STORAGE_IMAGENES}                                # [STORAGE]
# app.storage.firmas=${APP_STORAGE_FIRMAS}                                    # [STORAGE]
# app.storage.base=${APP_STORAGE_BASE}                                        # [STORAGE]

#Tama�o m�ximo de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
