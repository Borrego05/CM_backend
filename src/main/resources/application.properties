spring.application.name=backend

#CONFIGURACION CONEXION A LA BD LOCAL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8080
server.address=0.0.0.0

#JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

#Carpetas de almacenamiento
app.storage.pdf=${APP_STORAGE_FIRMAS}
app.storage.imagenes=${APP_STORAGE_IMAGENES}
app.storage.firmas=${APP_STORAGE_FIRMAS}
app.storage.base=${APP_STORAGE_BASE}

#Tama’┐Įo m’┐Įximo de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
